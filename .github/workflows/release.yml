name: Release

# On a version tag (v*), build the raw `digstore` CLI binary in release mode for
# every supported OS/arch and attach them to a GitHub Release. Two asset shapes
# are published, because two independent installers consume them with DIFFERENT
# naming conventions (both contracts are verified by their own repos' tests):
#
#   1. Bare per-OS binaries for the universal installer
#      (DIG-Network/dig-installer's RawBinary matcher, src/asset.rs) — a raw
#      executable it downloads and places on PATH (no archive):
#        * windows-x64  → digstore-<ver>-windows-x64.exe
#        * linux-x64    → digstore-<ver>-linux-x64
#        * macos-arm64  → digstore-<ver>-macos-arm64
#        * macos-x64    → digstore-<ver>-macos-x64
#
#   2. Linux .tar.gz tarballs for the APT repository
#      (DIG-Network/apt.dig.net's build-deb.sh, ASSET_TEMPLATE
#      `digstore-{ver}-{arch}-unknown-linux-gnu.tar.gz`) — each archive holds the
#      bare `digstore` binary at its root, which apt unpacks to /usr/bin/digstore:
#        * amd64 → digstore-<ver>-x86_64-unknown-linux-gnu.tar.gz
#        * arm64 → digstore-<ver>-aarch64-unknown-linux-gnu.tar.gz
#
# The polished desktop GUI installer (the single-file DigStore-Setup-*.exe /
# *.dmg / *.AppImage) now lives in DIG-Network/dig-installer, which CONSUMES the
# binaries published here — it is no longer built in this repo. This repo's job
# is to cargo-build and publish the `digstore` binary.
#
# The publish-s3-binary job below ALSO uploads the Linux x86_64 binary to the
# dighub artifact bucket for the hub compile-worker (unchanged).
on:
  push:
    tags:
      - "v*"

# Only the write scope needed to publish the release + upload the asset.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  binary:
    name: Build digstore CLI (${{ matrix.out_name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: digstore.exe
            # Bare binary for the universal installer (Windows RawBinary = .exe).
            out_name: windows-x64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: digstore
            # Bare binary for the universal installer (Linux RawBinary = no ext)…
            out_name: linux-x64
            # …PLUS a .tar.gz for apt, named to apt.dig.net's ASSET_TEMPLATE.
            tarball: digstore-{ver}-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-24.04-arm # native arm64 Linux runner
            target: aarch64-unknown-linux-gnu
            bin: digstore
            # apt builds an arm64 .deb from this; the universal installer does not
            # resolve a linux-arm64 RawBinary today, so only the tarball is needed.
            tarball: digstore-{ver}-aarch64-unknown-linux-gnu.tar.gz
          # Both macOS arches build on the fast Apple-silicon macos-14 runner.
          # The Intel binary is CROSS-COMPILED there (host arm64 → target
          # x86_64-apple-darwin) rather than on a native macos-13 (Intel) runner:
          # that Intel runner pool is chronically backlogged, so the macos-x64 job
          # used to hang for hours (pending, never failing) and the release never
          # completed. Cross-compiling needs no extra toolchain here — Apple's
          # clang (Xcode on macos-14) targets both arches and the build steps are
          # already `--target`-parameterized (rustup target add + cargo build
          # --target). The one native C dependency in the macOS build graph is
          # OpenSSL via datalayer-driver, but it is the `openssl-sys` *vendored*
          # feature (openssl-src builds OpenSSL from source through `cc`), which
          # the Apple toolchain compiles for x86_64 from the arm host — there is
          # no SYSTEM openssl to cross-link, so no cross-compile snag. Artifact
          # names (out_name / tarball) are byte-identical to the old macos-13 job
          # so the dig-installer + apt asset matchers still resolve them.
          - os: macos-14 # Apple silicon (arm64)
            target: aarch64-apple-darwin
            bin: digstore
            out_name: macos-arm64
          - os: macos-14 # Apple silicon — cross-compiles the Intel binary
            target: x86_64-apple-darwin
            bin: digstore
            out_name: macos-x64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain + target
        shell: bash
        run: |
          rustup show   # installs the toolchain pinned in rust-toolchain.toml (incl. wasm32 target)
          rustup target add ${{ matrix.target }}
          rustc --version

      - name: Cache cargo + targets
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-release-${{ matrix.target }}-

      # digstore-cli's build.rs embeds the real guest wasm (BINDING contract D6).
      - name: Build guest wasm
        run: cargo build -p digstore-guest --target wasm32-unknown-unknown --release --locked

      - name: Build digstore CLI (release)
        run: cargo build -p digstore-cli --release --locked --target ${{ matrix.target }} --bin digstore

      - name: Derive version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          SRC="target/${{ matrix.target }}/release/${{ matrix.bin }}"
          test -f "$SRC" || { echo "binary not produced: $SRC"; exit 1; }

          # (1) Bare per-OS binary for the universal installer, when this target
          #     declares an out_name (the installer does not resolve every triple).
          if [ -n "${{ matrix.out_name }}" ]; then
            cp "$SRC" "dist/digstore-${VERSION}-${{ matrix.out_name }}"
          fi

          # (2) .tar.gz (binary at archive root, named `digstore`) for apt, when
          #     this target declares a tarball template.
          if [ -n "${{ matrix.tarball }}" ]; then
            TARBALL="${{ matrix.tarball }}"
            TARBALL="${TARBALL/\{ver\}/$VERSION}"
            STAGE="$(mktemp -d)"
            cp "$SRC" "$STAGE/digstore"
            chmod 0755 "$STAGE/digstore"
            tar -czf "dist/${TARBALL}" -C "$STAGE" digstore
            rm -rf "$STAGE"
          fi
          ls -la dist

      - name: Upload assets as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: digstore-assets-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Single publish job — runs after ALL matrix builds so there is no race to
  # create the GitHub Release.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: binary
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          # The publish job does not checkout the repo, so gh has no local git
          # context — pass --repo explicitly (else `gh release create` errors
          # with "not a git repository").
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p dist-all
          find dist -type f -exec cp {} dist-all/ \;
          ls -la dist-all
          gh release create "${GITHUB_REF_NAME}" --repo "$GH_REPO" --title "digstore ${GITHUB_REF_NAME}" --generate-notes || echo "release already exists"
          gh release upload "${GITHUB_REF_NAME}" --repo "$GH_REPO" dist-all/* --clobber

  # ---------------------------------------------------------------------------
  # Publish the raw Linux x86_64 `digstore` binary to the dighub S3 artifact
  # bucket, so the hub compile-worker can SYNC the latest binary at runtime
  # (it shells out to `digstore compile` to build stores from staged files).
  # Layout:
  #   digstore/<version>/digstore   — the binary for this release
  #   digstore/latest.json          — { version, key, sha256 } the worker reads
  # Auth is GitHub OIDC into a dedicated dighub role (S3 PutObject on the bucket
  # only); configure these repo settings:
  #   secret AWS_ARTIFACT_ROLE_ARN, var AWS_REGION, var DIGSTORE_ARTIFACT_BUCKET
  # The job no-ops (does not fail the release) when they are absent.
  # ---------------------------------------------------------------------------
  publish-s3-binary:
    name: Publish digstore binary to S3
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write # OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Skip if AWS artifact bucket is not configured
        id: gate
        run: |
          if [ -z "${{ secrets.AWS_ARTIFACT_ROLE_ARN }}" ] || [ -z "${{ vars.DIGSTORE_ARTIFACT_BUCKET }}" ]; then
            echo "AWS artifact publishing not configured (set AWS_ARTIFACT_ROLE_ARN + DIGSTORE_ARTIFACT_BUCKET); skipping."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pinned Rust toolchain
        if: steps.gate.outputs.enabled == 'true'
        run: rustup show

      - name: Build guest wasm
        if: steps.gate.outputs.enabled == 'true'
        run: cargo build -p digstore-guest --target wasm32-unknown-unknown --release --locked

      - name: Build digstore CLI (Linux x86_64, release)
        if: steps.gate.outputs.enabled == 'true'
        run: cargo build -p digstore-cli --release --locked

      - name: Configure AWS credentials (OIDC)
        if: steps.gate.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ARTIFACT_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload binary + version marker to S3
        if: steps.gate.outputs.enabled == 'true'
        env:
          BUCKET: ${{ vars.DIGSTORE_ARTIFACT_BUCKET }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BIN=target/release/digstore
          test -f "$BIN" || { echo "missing $BIN"; exit 1; }
          SHA=$(sha256sum "$BIN" | cut -d' ' -f1)
          KEY="digstore/${VERSION}/digstore"
          echo "publishing $BIN ($SHA) -> s3://$BUCKET/$KEY"
          aws s3 cp "$BIN" "s3://$BUCKET/$KEY" \
            --content-type application/octet-stream \
            --metadata "sha256=$SHA,version=$VERSION"
          # The version marker the worker polls. Written LAST so a half-uploaded
          # binary is never advertised as latest.
          printf '{"version":"%s","key":"%s","sha256":"%s"}\n' "$VERSION" "$KEY" "$SHA" > latest.json
          aws s3 cp latest.json "s3://$BUCKET/digstore/latest.json" \
            --content-type application/json --cache-control "no-cache"
          echo "published digstore ${VERSION}"
