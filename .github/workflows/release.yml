name: Release

# On a version tag (v*), build the digstore CLI in release mode and produce ONE
# run-once installer artifact per OS. The digstore binary is embedded directly
# into the installer (build.rs), so each download is a single self-contained
# file that, when run, installs digstore — no installer-installs-the-installer:
#
#   * Windows → DigStore-Setup-<ver>-windows-x64.exe   (raw Tauri exe, no NSIS/MSI)
#   * macOS   → DigStore-Setup-<ver>-macos.dmg          (one mountable run-once .app)
#   * Linux   → DigStore-Setup-<ver>-linux-x86_64.AppImage (single executable)
on:
  push:
    tags:
      - "v*"

# Only the write scope needed to publish the release + upload the asset.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  installer:
    name: Installer (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bin: digstore.exe
            # Windows ships the raw, self-contained exe (no NSIS/MSI wrapper).
            build_args: "--no-bundle"
            artifact_glob: "src-tauri/target/release/*.exe"
            out_name: "windows-x64.exe"
          - os: macos-latest
            bin: digstore
            build_args: "--bundles dmg"
            artifact_glob: "src-tauri/target/release/bundle/dmg/*.dmg"
            out_name: "macos.dmg"
          - os: ubuntu-22.04
            bin: digstore
            build_args: "--bundles appimage"
            artifact_glob: "src-tauri/target/release/bundle/appimage/*.AppImage"
            out_name: "linux-x86_64.AppImage"
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        run: |
          rustup show   # installs the toolchain pinned in rust-toolchain.toml (incl. wasm32 target)
          rustc --version

      # Linux needs the webkit2gtk stack for Tauri.
      - name: Install Linux Tauri deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache cargo + targets
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
            installer/app/src-tauri/target
          key: ${{ runner.os }}-tauri-release-${{ hashFiles('**/Cargo.lock', 'installer/app/src-tauri/Cargo.toml', 'installer/app/package-lock.json') }}
          restore-keys: ${{ runner.os }}-tauri-release-

      # digstore-cli's build.rs embeds the real guest wasm (BINDING contract D6).
      - name: Build guest wasm
        run: cargo build -p digstore-guest --target wasm32-unknown-unknown --release --locked

      - name: Build digstore CLI (release)
        run: cargo build -p digstore-cli --release --locked

      - name: Derive version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install frontend deps
        working-directory: installer/app
        run: npm ci || npm install

      # Stage the just-built digstore binary so the installer's build.rs embeds
      # it (single-file install) + records its SHA-256 for the verify gate.
      - name: Stage bundled digstore binary
        working-directory: installer/app
        run: node scripts/stage-binary.mjs --src ../../target/release/${{ matrix.bin }}

      - name: Build the installer
        working-directory: installer/app
        run: npx tauri build ${{ matrix.build_args }}

      - name: Collect single installer artifact
        id: collect
        shell: bash
        working-directory: installer/app
        run: |
          mkdir -p ../../dist-installers
          artifact="$(ls -1 ${{ matrix.artifact_glob }} | head -n1)"
          if [ -z "$artifact" ]; then
            echo "no artifact matched ${{ matrix.artifact_glob }}"; exit 1
          fi
          dest="../../dist-installers/DigStore-Setup-${VERSION}-${{ matrix.out_name }}"
          cp "$artifact" "$dest"
          echo "staged $dest"
          ls -la ../../dist-installers

      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: digstore-installer-${{ matrix.os }}
          path: dist-installers/*
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Single publish job — runs after ALL matrix builds so there is no race to
  # create the GitHub Release (the previous per-matrix publish raced: the first
  # job created the release, the others 401'd / "release not found").
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: installer
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          # The publish job does not checkout the repo, so gh has no local git
          # context — pass --repo explicitly (else `gh release create` errors
          # with "not a git repository").
          GH_REPO: ${{ github.repository }}
        run: |
          mkdir -p dist-all
          find dist -type f -exec cp {} dist-all/ \;
          ls -la dist-all
          gh release create "${GITHUB_REF_NAME}" --repo "$GH_REPO" --title "digstore ${GITHUB_REF_NAME}" --generate-notes || echo "release already exists"
          gh release upload "${GITHUB_REF_NAME}" --repo "$GH_REPO" dist-all/* --clobber

  # ---------------------------------------------------------------------------
  # Publish the raw Linux x86_64 `digstore` binary to the dighub S3 artifact
  # bucket, so the hub compile-worker can SYNC the latest binary at runtime
  # (it shells out to `digstore compile` to build stores from staged files).
  # Layout:
  #   digstore/<version>/digstore   — the binary for this release
  #   digstore/latest.json          — { version, key, sha256 } the worker reads
  # Auth is GitHub OIDC into a dedicated dighub role (S3 PutObject on the bucket
  # only); configure these repo settings:
  #   secret AWS_ARTIFACT_ROLE_ARN, var AWS_REGION, var DIGSTORE_ARTIFACT_BUCKET
  # The job no-ops (does not fail the release) when they are absent.
  # ---------------------------------------------------------------------------
  publish-s3-binary:
    name: Publish digstore binary to S3
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write # OIDC
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Skip if AWS artifact bucket is not configured
        id: gate
        run: |
          if [ -z "${{ secrets.AWS_ARTIFACT_ROLE_ARN }}" ] || [ -z "${{ vars.DIGSTORE_ARTIFACT_BUCKET }}" ]; then
            echo "AWS artifact publishing not configured (set AWS_ARTIFACT_ROLE_ARN + DIGSTORE_ARTIFACT_BUCKET); skipping."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install pinned Rust toolchain
        if: steps.gate.outputs.enabled == 'true'
        run: rustup show

      - name: Build guest wasm
        if: steps.gate.outputs.enabled == 'true'
        run: cargo build -p digstore-guest --target wasm32-unknown-unknown --release --locked

      - name: Build digstore CLI (Linux x86_64, release)
        if: steps.gate.outputs.enabled == 'true'
        run: cargo build -p digstore-cli --release --locked

      - name: Configure AWS credentials (OIDC)
        if: steps.gate.outputs.enabled == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ARTIFACT_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload binary + version marker to S3
        if: steps.gate.outputs.enabled == 'true'
        env:
          BUCKET: ${{ vars.DIGSTORE_ARTIFACT_BUCKET }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BIN=target/release/digstore
          test -f "$BIN" || { echo "missing $BIN"; exit 1; }
          SHA=$(sha256sum "$BIN" | cut -d' ' -f1)
          KEY="digstore/${VERSION}/digstore"
          echo "publishing $BIN ($SHA) -> s3://$BUCKET/$KEY"
          aws s3 cp "$BIN" "s3://$BUCKET/$KEY" \
            --content-type application/octet-stream \
            --metadata "sha256=$SHA,version=$VERSION"
          # The version marker the worker polls. Written LAST so a half-uploaded
          # binary is never advertised as latest.
          printf '{"version":"%s","key":"%s","sha256":"%s"}\n' "$VERSION" "$KEY" "$SHA" > latest.json
          aws s3 cp latest.json "s3://$BUCKET/digstore/latest.json" \
            --content-type application/json --cache-control "no-cache"
          echo "published digstore ${VERSION}"
