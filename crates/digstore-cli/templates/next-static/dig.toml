# dig.toml — your DIG project config. Committed to your repo; contains NO secrets.
#
# `digstore dev`    — preview locally for free (runs the static export, serves the
#                     real chia:// read path; no chain, no spend).
# `digstore deploy` — export + publish on Chia (costs the capsule price in $DIG + an XCH fee).

# Next.js static export writes to `out/`. That is what we publish.
output-dir = "out"

# `output: "export"` in next.config.mjs makes `next build` emit a static `out/`.
build-command = "npm install && npm run build"

# store-id = "REPLACE_WITH_YOUR_64_HEX_STORE_ID"
